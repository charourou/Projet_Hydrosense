name: Build & Deploy API to Cloud Run

on:
  push:
    branches:
      - master

env:
  GCP_PROJECT_ID: hydro-sense-498112
  GCP_REGION: europe-west1
  DOCKER_REPO_NAME: hydrosense-repo
  DOCKER_IMAGE_NAME: hydrosense-api
  CLOUD_RUN_SERVICE: hydrosense-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t \
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.DOCKER_REPO_NAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Push to Artifact Registry
        run: |
          docker push \
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.DOCKER_REPO_NAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.DOCKER_REPO_NAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --memory 1Gi \
            --timeout 300 \
            --allow-unauthenticated \
            --set-secrets="/secrets/gcp-key.json=gcp-credentials:latest" \
            --set-env-vars="GOOGLE_APPLICATION_CREDENTIALS=/secrets/gcp-key.json,GCP_PROJECT_ID=hydro-sense-498112,BQ_DATASET_ID=piezometry,BQ_REGION=europe-west1"
